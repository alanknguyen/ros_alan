# ═══════════════════════════════════════════════════════════════════════════════
# objects.yaml — Object Registry for Scene State Publisher
# ═══════════════════════════════════════════════════════════════════════════════
#
# This file maps logical object names to their OptiTrack rigid body names
# and physical properties. The scene_state_publisher.py reads this file
# and uses it to build the JSON scene state message.
#
# HOW TO ADD A NEW OBJECT:
#   1. Create a rigid body in Motive with 3-4 retroreflective markers
#   2. Note the rigid body name in Motive (e.g., "rigid_body_4")
#   3. Add an entry below with:
#        - optitrack_body: exact name from Motive (case-sensitive)
#        - class: object type (cube, cylinder, sphere, mug, etc.)
#        - color: visual color name (for LLM scene descriptions)
#        - dimensions_m: [width, depth, height] in meters
#   4. Restart scene_state_publisher.py — no code changes needed!
#
# The scene_state_publisher.py treats this file as the single source of truth
# for what objects exist in the workspace.
# ═══════════════════════════════════════════════════════════════════════════════

objects:
  red_cube:
    optitrack_body: "rigid_body_1"
    class: cube
    color: red
    dimensions_m: [0.05, 0.05, 0.05]

  blue_cube:
    optitrack_body: "rigid_body_2"
    class: cube
    color: blue
    dimensions_m: [0.05, 0.05, 0.05]

  green_cube:
    optitrack_body: "rigid_body_3"
    class: cube
    color: green
    dimensions_m: [0.03, 0.03, 0.03]

  blue_cylinder:
    optitrack_body: "rigid_body_4"
    class: cylinder
    color: blue
    dimensions_m: [0.05, 0.05, 0.08]

  yellow_cylinder:
    optitrack_body: "rigid_body_5"
    class: cylinder
    color: yellow
    dimensions_m: [0.05, 0.05, 0.08]

  # ── Uncomment and customize as needed ──────────────────────────────────────
